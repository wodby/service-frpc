name: frpc
icon: frpc
type: infrastructure
title: FRPC
hostname: frpc
containers:
  - name: frpc

helm:
  name: wodby
  source: oci://registry-1.docker.io/wodby/frpc
  chart: oci://registry-1.docker.io/wodby/frpc
  version: 0.1.0
  configurations:
    - name: frpc
      labels: labels
      annotations: podAnnotations
      env: envVars
  values:
    - name: frpc.serverAddr
      value: '{{kubernetes.frpc.serverAddr}}'
    - name: frpc.serverPort
      value: '{{kubernetes.frpc.serverPort}}'
    - name: frpc.httpUser
      value: '{{kubernetes.frpc.httpUser}}'
    - name: frpc.httpPassword
      value: '{{kubernetes.frpc.httpPassword}}'
    - name: frpc.oidcTokenEndpointURL
      value: '{{kubernetes.frpc.oidcTokenEndpointURL}}'
    - name: frpc.authMethod
      value: 'oidc'
    - name: frpc.oidcClientID
      value: '{{kubernetes.frpc.oidcClientID}}'      
    - name: frpc.oidcClientSecret
      value: '{{kubernetes.frpc.oidcClientSecret}}'
    - name: frpc.customDomain
      value: '{{kubernetes.frpc.customDomain}}'
    - name: frpc.apiPrefix
      value: '/{{kubernetes.frpc.location}}/'
    - name: frpc.location
      value: '/{{kubernetes.frpc.location}}'
